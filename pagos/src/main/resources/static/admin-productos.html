<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos — Panel Admin</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="topbar" class="topbar"></div>

  <div class="container">
    <div class="page-header">
      <h1>Gestión de productos</h1>
      <button class="btn btn--accent" id="newProductBtn">+ Nuevo producto</button>
    </div>
    <div id="alertBox"></div>
    <div id="productsTableWrap"></div>
  </div>

  <!-- Modal crear/editar -->
  <div id="productModal" class="hidden" style="position:fixed; inset:0; background:rgba(37,39,43,0.5); display:flex; align-items:center; justify-content:center; z-index:1000;">
    <div style="background:white; border-radius:14px; padding:24px; width:100%; max-width:420px;">
      <div class="flex-between">
        <h3 id="modalTitle" style="margin:0;">Nuevo producto</h3>
        <button class="btn btn--outline btn--sm" id="closeProductModalBtn">Cerrar</button>
      </div>

      <form id="productForm" class="mt-16">
        <input type="hidden" id="productId" />
        <div class="field">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required />
        </div>
        <div class="field">
          <label for="descripcion">Descripción</label>
          <input type="text" id="descripcion" />
        </div>
        <div class="field">
          <label for="precio">Precio (S/)</label>
          <input type="number" id="precio" min="0" step="0.01" required />
        </div>
        <div class="field">
          <label for="stock">Stock</label>
          <input type="number" id="stock" min="0" required />
        </div>
        <div class="field">
          <label for="imagenUrl">URL de imagen (opcional)</label>
          <input type="text" id="imagenUrl" placeholder="https://..." />
        </div>
        <button type="submit" class="btn btn--primary btn--block" id="saveProductBtn">Guardar</button>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/admin-productos.js"></script>
</body>
</html>
