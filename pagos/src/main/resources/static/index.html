<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermercado SPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilos Flat y SPA */
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .page { display: none; }
        .active { display: block; }
        .card { border: none; border-radius: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn { border-radius: 0; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#" onclick="APP.showPage('home')">SUPERMERCADO</a>
        <div class="navbar-nav w-100 d-flex justify-content-between">
            <div class="d-flex">
                <a class="nav-link" href="#" onclick="APP.showPage('home')">Catálogo</a>
                <a class="nav-link" href="#" onclick="APP.showPage('cart')">Carrito</a>
            </div>
            <div class="d-flex" id="nav-auth-section">
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div id="home" class="page active">
        <h2 class="mb-4">Nuestros Productos</h2>
        <div id="product-list" class="row"></div>
    </div>

    <div id="cart" class="page">
        <h2 class="mb-4">Mi Carrito</h2>
        <div class="card p-4">
            <table class="table table-hover">
                <thead><tr><th>Producto</th><th>Cantidad</th><th>Precio</th></tr></thead>
                <tbody id="cart-items"></tbody>
            </table>
            <h4 class="text-end text-primary mb-4">Total: $<span id="total-amount">0.00</span></h4>

            <div class="row justify-content-end">
                <div class="col-md-4">
                    <label class="form-label">Método de Pago:</label>
                    <select id="payment-method" class="form-select mb-3">
                        <option value="CARD">Tarjeta de Crédito/Débito</option>
                        <option value="CASH">Efectivo en Tienda</option>
                    </select>
                    <button class="btn btn-success w-100 btn-lg" onclick="procesarPago()">CONFIRMAR COMPRA</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin" class="page">
        <h2 class="mb-4">Panel de Administración</h2>
        <div class="card p-4">
            <div id="report-list"></div>
        </div>
    </div>

    <div id="profile" class="page">
        <h2 class="mb-4">Mi Perfil</h2>
        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card p-4">
                    <h4>Datos Personales</h4>
                    <div id="user-info"></div>
                </div>
            </div>
            <div class="col-md-8">
                <div class="card p-4">
                    <h4>Historial de Compras</h4>
                    <div id="user-orders"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="login" class="page">
        <div class="card p-4 mx-auto mt-5" style="max-width: 400px;">
            <h3 class="text-center mb-4">Iniciar Sesión</h3>
            <input type="email" id="login-email" class="form-control mb-3" placeholder="Correo Electrónico">
            <input type="password" id="login-pass" class="form-control mb-3" placeholder="Contraseña">
            <button class="btn btn-primary w-100 mb-3" onclick="autenticar()">Entrar</button>
            <div class="text-center">
                <a href="#" class="text-decoration-none" onclick="APP.showPage('register')">¿No tienes cuenta? Regístrate</a>
            </div>
        </div>
    </div>

    <div id="register" class="page">
        <div class="card p-4 mx-auto mt-5" style="max-width: 400px;">
            <h3 class="text-center mb-4">Crear Cuenta</h3>
            <input type="text" id="reg-name" class="form-control mb-3" placeholder="Nombre Completo">
            <input type="email" id="reg-email" class="form-control mb-3" placeholder="Correo Electrónico">
            <input type="password" id="reg-pass" class="form-control mb-3" placeholder="Contraseña">
            <button class="btn btn-success w-100" onclick="registrar()">Registrarse</button>
        </div>
    </div>
</div>

<script src="/pagos/src/main/resources/static/js/api.js"></script>
</body>
</html>
