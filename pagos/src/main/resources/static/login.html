<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Mercado Fresco</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-card__logo">🛒 Mercado Fresco</div>
      <div class="auth-card__tagline">Inicia sesión para comprar</div>

      <div id="alertBox"></div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="pass">Contraseña</label>
          <input type="password" id="pass" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn--primary" id="submitBtn">Entrar</button>
      </form>

      <p class="mt-16" style="text-align:center; font-size:0.88rem;">
        ¿No tienes cuenta? <a href="register.html">Regístrate</a>
      </p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
